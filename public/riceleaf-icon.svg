<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" role="img" aria-label="AgriPulse">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="192" y2="192" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="70" y1="30" x2="140" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#bbf7d0"/>
      <stop offset="50%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="42" fill="url(#bg)"/>

  <!-- Rice leaf - elongated, natural shape -->
  <g filter="url(#shadow)">
    <path d="M96 28 C80 48, 58 72, 52 100 C46 128, 56 148, 72 158 C88 168, 108 168, 120 158 C132 148, 138 128, 132 100 C126 72, 112 48, 96 28Z" fill="url(#leafGrad)"/>
    <!-- Leaf vein - center -->
    <path d="M96 36 C94 60, 88 90, 84 120 C80 140, 82 152, 86 158" fill="none" stroke="#15803d" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <!-- Leaf veins - sides -->
    <path d="M96 50 C108 58, 118 70, 124 82" fill="none" stroke="#15803d" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <path d="M94 70 C82 78, 68 88, 62 98" fill="none" stroke="#15803d" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <path d="M92 90 C104 96, 116 108, 122 120" fill="none" stroke="#15803d" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <path d="M90 110 C78 116, 66 126, 60 136" fill="none" stroke="#15803d" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Disease spots on leaf -->
  <circle cx="108" cy="68" r="4.5" fill="#92400e" opacity="0.85"/>
  <circle cx="108" cy="68" r="2" fill="#a16207" opacity="0.6"/>
  <circle cx="80" cy="105" r="3.5" fill="#78350f" opacity="0.8"/>
  <circle cx="80" cy="105" r="1.5" fill="#a16207" opacity="0.5"/>
  <circle cx="112" cy="118" r="3" fill="#92400e" opacity="0.75"/>

  <!-- Magnifying glass -->
  <circle cx="126" cy="56" r="22" fill="none" stroke="white" stroke-width="4" opacity="0.9"/>
  <circle cx="126" cy="56" r="22" fill="rgba(255,255,255,0.08)"/>
  <line x1="141" y1="71" x2="158" y2="88" stroke="white" stroke-width="4.5" stroke-linecap="round" opacity="0.9"/>

  <!-- AI detection crosshair inside magnifier -->
  <circle cx="126" cy="56" r="8" fill="none" stroke="#facc15" stroke-width="1.5" opacity="0.9"/>
  <line x1="126" y1="46" x2="126" y2="50" stroke="#facc15" stroke-width="1.2" opacity="0.8"/>
  <line x1="126" y1="62" x2="126" y2="66" stroke="#facc15" stroke-width="1.2" opacity="0.8"/>
  <line x1="116" y1="56" x2="120" y2="56" stroke="#facc15" stroke-width="1.2" opacity="0.8"/>
  <line x1="132" y1="56" x2="136" y2="56" stroke="#facc15" stroke-width="1.2" opacity="0.8"/>
</svg>